<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parking Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            background: rgba(15, 23, 42, 0.85);
            padding: 2rem;
            border-radius: 16px;
            width: min(90vw, 360px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        input {
            padding: 0.8rem;
            border: 1px solid #64748b;
            border-radius: 10px;
            font-size: 1rem;
        }

        button {
            padding: 0.85rem;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            color: #082f49;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Parking Login</h2>
        <form>
            <input type="text" placeholder="Username" />
            <input type="password" placeholder="Password" />
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
